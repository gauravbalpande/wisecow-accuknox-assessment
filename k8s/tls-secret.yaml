# This TLS secret is auto-generated by scripts/deploy.sh
# using a self-signed certificate for local development.
#
# For production, replace with cert-manager or a real CA certificate.
#
# To generate manually:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt \
#     -subj "/CN=wisecow.local/O=Wisecow"
#
#   kubectl create secret tls wisecow-tls-secret \
#     --cert=tls.crt --key=tls.key -n wisecow
#
apiVersion: v1
kind: Secret
metadata:
  name: wisecow-tls-secret
  namespace: wisecow
type: kubernetes.io/tls
data:
  # Base64-encoded TLS certificate and key
  # Replace these with actual values or use deploy.sh to auto-generate
  tls.crt: ""
  tls.key: ""
