name: Wisecow CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wisecow

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Test
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint Bash scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck wisecow.sh || true
          shellcheck scripts/*.sh || true

      - name: Test script execution
        run: |
          chmod +x wisecow.sh
          timeout 5 ./wisecow.sh test || true

      - name: Validate Kubernetes manifests
        # run: |
        #   curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        #   chmod +x kubectl
        #   sudo mv kubectl /usr/local/bin/
        #   kubectl apply --dry-run=client -f k8s/namespace.yaml
        #   kubectl apply --dry-run=client -f k8s/deployment.yaml
        #   kubectl apply --dry-run=client -f k8s/service.yaml
        #   kubectl apply --dry-run=client -f k8s/ingress.yaml
        uses: instrumenta/kubeval-action@master
        with:
          files: k8s/

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────────
  # Job 3: Deploy to Kubernetes (Kind cluster)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: wisecow-cluster

      - name: Install NGINX Ingress Controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          echo "Waiting for ingress controller to be ready..."
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s

      - name: Generate TLS certificate
        run: |
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout tls.key -out tls.crt \
            -subj "/CN=wisecow.local/O=Wisecow"

      - name: Deploy to Kubernetes
        run: |
          # Create namespace
          kubectl apply -f k8s/namespace.yaml

          # Create TLS secret
          kubectl create secret tls wisecow-tls-secret \
            --cert=tls.crt --key=tls.key \
            -n wisecow --dry-run=client -o yaml | kubectl apply -f -

          # Update image tag in deployment
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          sed -i "s|ghcr.io/gauravbalpande/wisecow:latest|${IMAGE_TAG}|g" k8s/deployment.yaml

          # Apply manifests
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for deployment rollout..."
          kubectl rollout status deployment/wisecow-deployment -n wisecow --timeout=120s

          echo ""
          echo "📊 Pod status:"
          kubectl get pods -n wisecow -o wide

          echo ""
          echo "🔗 Service status:"
          kubectl get svc -n wisecow

          echo ""
          echo "🌐 Ingress status:"
          kubectl get ingress -n wisecow

          echo ""
          echo "✅ Deployment successful!"
