name: Wisecow CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wisecow

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Test
  # ─────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Lint Bash scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck wisecow.sh
          shellcheck scripts/*.sh

      - name: Test script execution
        run: |
          chmod +x wisecow.sh
          ./wisecow.sh test

      - name: Validate Kubernetes manifests (offline)
        run: |
          set -euo pipefail
          # Install kubeconform (offline manifest validation)
          curl -sSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz kubeconform
          chmod +x kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

          # Validate everything under k8s/ without contacting a cluster.
          # KubeArmor CRDs may not have schemas available by default; ignore missing schemas.
          kubeconform -summary -output text -strict -ignore-missing-schemas k8s/*.yaml

      - name: Dockerfile lint (Hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # Use explicit workspace path to avoid config pathing issues in the action container.
          config: /github/workspace/.hadolint.yaml

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Security scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          # Scan the just-built image by digest to avoid tag timing/visibility issues.
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          format: table
          exit-code: "0"
          ignore-unfixed: true

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

  # ─────────────────────────────────────────────
  # Job 3: Deploy to Kubernetes (Kind cluster)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: wisecow-cluster

      - name: Install NGINX Ingress Controller
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
          echo "Waiting for ingress controller to be ready..."
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s
          echo "Waiting for ingress admission webhook endpoints..."
          for i in $(seq 1 60); do
            EP_ADDR="$(kubectl -n ingress-nginx get endpoints ingress-nginx-controller-admission -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || true)"
            if [ -n "${EP_ADDR}" ]; then
              echo "Admission webhook ready."
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Admission webhook still not ready; continuing (deploy step will retry ingress apply)."
            fi
            sleep 2
          done

      - name: Generate TLS certificate
        run: |
          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout tls.key -out tls.crt \
            -subj "/CN=wisecow.local/O=Wisecow"

      - name: Deploy to Kubernetes
        run: |
          # Create namespace
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/serviceaccount.yaml

          # Create TLS secret
          kubectl create secret tls wisecow-tls-secret \
            --cert=tls.crt --key=tls.key \
            -n wisecow --dry-run=client -o yaml | kubectl apply -f -

          # Apply manifests
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          # Ingress admission webhook can be briefly unavailable; retry.
          for i in $(seq 1 10); do
            if kubectl apply -f k8s/ingress.yaml; then
              break
            fi
            echo "Ingress apply failed (attempt $i/10). Retrying in 3s..."
            sleep 3
          done
          kubectl apply -f k8s/pdb.yaml
          kubectl apply -f k8s/networkpolicy.yaml

          # Ensure image points to latest pushed tag
          kubectl set image deployment/wisecow-deployment wisecow=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest -n wisecow

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for deployment rollout..."
          kubectl rollout status deployment/wisecow-deployment -n wisecow --timeout=120s

          echo ""
          echo "📊 Pod status:"
          kubectl get pods -n wisecow -o wide

          echo ""
          echo "🔗 Service status:"
          kubectl get svc -n wisecow

          echo ""
          echo "🌐 Ingress status:"
          kubectl get ingress -n wisecow

          echo ""
          echo "✅ Deployment successful!"
